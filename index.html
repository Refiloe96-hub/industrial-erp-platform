<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="B2B Industrial ERP - AI-Powered Operations Platform">
    <meta name="theme-color" content="#1a1a1a">
    <title>Industrial ERP Platform</title>

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- PDF Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Deeper, more industrial palette */
            --primary: #1e3a8a;
            /* Slate Blue */
            --primary-dark: #172554;
            --primary-light: #e0e7ff;
            --success: #059669;
            /* Emerald */
            --warning: #d97706;
            /* Amber */
            --danger: #dc2626;
            /* Crimson */

            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            /* Lighter slate gray */
            --bg-tertiary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;

            /* Visual Polish */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius-md: 8px;
            --radius-lg: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Header Styles */
        .app-header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-brand h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        #sync-status-widget {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.25rem 0.75rem;
            background: #f1f5f9;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #64748b;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        #sync-status-widget.offline {
            background: #fef2f2;
            border-color: #fecaca;
            color: #ef4444;
        }

        #sync-status-widget.syncing {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #22c55e;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 1rem;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Offline Banner */
        .offline-banner {
            display: none;
            background: var(--warning);
            color: white;
            padding: 0.5rem 1rem;
            text-align: center;
            font-size: 0.875rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .offline-banner.show {
            display: block;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading Industrial ERP...</p>
        </div>
    </div>

    <div id="offline-banner" class="offline-banner">
        <i class="ph-bold ph-wifi-slash"></i> Offline Mode - Changes will sync when connection is restored
    </div>

    <script type="module" src="/src/main.js"></script>

    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('✅ Service Worker registered'))
                    .catch(err => console.error('❌ Service Worker registration failed:', err));
            });
        }

        // Offline Detection
        const offlineBanner = document.getElementById('offline-banner');

        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineBanner.classList.remove('show');
            } else {
                offlineBanner.classList.add('show');
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();
    </script>
</body>

</html>
